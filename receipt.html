<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Receipt</title>

<!-- PNG -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  font-family: sans-serif;
  background: #eee;
}

.toolbar {
  text-align: center;
  margin: 20px;
}

.btn {
  padding: 10px 15px;
  margin: 5px;
  cursor: pointer;
}

.bill {
  width: 210mm;
  min-height: 148mm; /* 🔥 เปลี่ยนเป็น min-height */
  margin: 0 auto;
  padding: 10mm;
  border: 2px solid #000;
  background: #fff;
  box-sizing: border-box;

  page-break-after: always;   /* 🔥 ใช้ตัวนี้แทน */
  page-break-inside: avoid;
}

@media print {
  body {
    margin: 0;
  }
}

.actions {
  text-align: center;
  margin-bottom: 20px;
}

table {
  width:100%;
  border-collapse: collapse;
}

td, th {
  border:1px solid #000;
  padding:6px;
  text-align:center;
}

.left {
  text-align:left;
}
</style>
</head>

<body>

<!-- 🔥 ปุ่มรวม -->
<div class="toolbar">
  <button class="btn" onclick="downloadAll()">📥 PNG ทั้งหมด</button>
  <button class="btn" onclick="saveAllPDF()">📄 PDF ทั้งหมด</button>
</div>

<div id="container"></div>

<script>
const data = JSON.parse(localStorage.getItem("billData")) || [];

let html = "";

data.forEach((d, index) => {

  html += `
  
  <!-- 🔥 ปุ่มต่อห้อง -->
  <div class="actions">
    <button class="btn" onclick="downloadOne(${index})">
      📥 PNG ห้อง ${d.house}
    </button>

    <button class="btn" onclick="savePDF(${index})">
      📄 PDF ห้อง ${d.house}
    </button>
  </div>

  <!-- 📄 บิล -->
  <div class="bill" id="bill-${index}">
    <h2 style="text-align:center;">Monthly Rental</h2>
    <h3 style="text-align:center;">House No. ${d.house}</h3>
    <h3 style="text-align:center;">
      ${new Date().toLocaleDateString("en-US", {month:"long",year:"numeric"})}
    </h3>

    <table>
      <tr>
        <th>Detail</th>
        <th>Previous water</th>
        <th>Current water</th>
        <th>Unit</th>
        <th>Price</th>
      </tr>

      <tr>
        <td class="left">Water</td>
        <td>${d.wStart ?? 0}</td>
        <td>${d.wEnd ?? 0}</td>
        <td>${d.unit ?? 0}</td>
        <td>${d.water ?? 0}</td>
      </tr>

      <tr>
        <td class="left">Electricity</td>
        <td>-</td>
        <td>-</td>
        <td>-</td>
        <td>${d.elec ?? 0}</td>
      </tr>

      <tr>
        <td class="left">Other</td>
        <td colspan="3">-</td>
        <td>${d.other ?? 0}</td>
      </tr>

      <tr>
        <td class="left">Rental</td>
        <td colspan="3">-</td>
        <td>${d.rent ?? 0}</td>
      </tr>

      <tr>
        <td class="left"><b>Total</b></td>
        <td colspan="3"></td>
        <td><b>${d.total ?? 0}</b></td>
      </tr>
    </table>

    <br>
    <div>Paying on the 5th of every month</div>

    <br><br>
    <div style="text-align:center;">
      Sign _______________________<br>
      Owner
    </div>
  </div>
  `;
});

document.getElementById("container").innerHTML = html;


// 📥 PNG ทีละห้อง
function downloadOne(i) {
  const d = data[i];

  html2canvas(document.querySelector(`#bill-${i}`)).then(canvas => {
    let link = document.createElement("a");
    link.download = `bill_${d.house.replace("/", "-")}.png`;
    link.href = canvas.toDataURL();
    link.click();
  });
}

// 📥 PNG ทั้งหมด
function downloadAll() {
  document.querySelectorAll(".bill").forEach((el, i) => {
    const d = data[i];

    html2canvas(el).then(canvas => {
      let link = document.createElement("a");
      link.download = `bill_${d.house.replace("/", "-")}.png`;
      link.href = canvas.toDataURL();
      link.click();
    });
  });
}

// 📄 PDF ทีละห้อง (A5 แนวนอน)
function savePDF(i) {
  const d = data[i];
  const el = document.getElementById(`bill-${i}`);

  html2pdf()
  .from(el)
  .set({
    margin: 0,
    filename: `bill_${d.house.replace("/", "-")}.pdf`,
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: "mm", format: "a5", orientation: "landscape" }
  })
  .save();
}

// 📄 PDF ทั้งหมด
function saveAllPDF() {
  const wrapper = document.createElement("div");

  document.querySelectorAll(".bill").forEach(el => {
    const clone = el.cloneNode(true);
    wrapper.appendChild(clone);
  });

  document.body.appendChild(wrapper);

  setTimeout(() => {
    html2pdf()
      .from(wrapper)
      .set({
        margin: 0,
        filename: "all_bills.pdf",
        html2canvas: { scale: 2 },
        jsPDF: {
          unit: "mm",
          format: "a5",
          orientation: "landscape"
        }
      })
      .save()
      .then(() => document.body.removeChild(wrapper));
  }, 300);
}
</script>

</body>
</html>
