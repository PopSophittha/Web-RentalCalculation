<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ใบเสร็จ</title>

<!-- PNG -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  font-family: sans-serif;
  background: #eee;
}

.toolbar {
  text-align: center;
  margin: 20px;
}

.btn {
  padding: 10px 15px;
  margin: 5px;
  cursor: pointer;
}

.bill {
  width: 202mm;
  height: 140mm;
  margin: 0 auto;
  background: #fff;
  border: 2px solid #000;
  padding: 10mm;
  box-sizing: border-box;
}

.bill {
  page-break-inside: avoid;
}

@media print {
  body {
    margin: 0;
  }
}

.actions {
  text-align: center;
  margin-bottom: 20px;
}

table {
  width:100%;
  border-collapse: collapse;
}

td, th {
  border:1px solid #000;
  padding:6px;
  text-align:center;
}

.left {
  text-align:left;
}
</style>
</head>

<body>

<!-- 🔥 ปุ่มรวม -->
<div class="toolbar">
  <button class="btn" onclick="downloadAll()">📥 PNG ทั้งหมด</button>
  <button class="btn" onclick="saveAllPDF()">📄 PDF ทั้งหมด</button>
</div>

<div id="container"></div>

<script>
const data = JSON.parse(localStorage.getItem("billData")) || [];

let html = "";

data.forEach((d, index) => {

  html += `
  
  <!-- 🔥 ปุ่มต่อห้อง -->
  <div class="actions">
    <button class="btn" onclick="downloadOne(${index})">
      📥 PNG ห้อง ${d.house}
    </button>

    <button class="btn" onclick="savePDF(${index})">
      📄 PDF ห้อง ${d.house}
    </button>
  </div>

  <!-- 📄 บิล -->
  <div class="bill" id="bill-${index}">
    <h2 style="text-align:center;">บิลค่าเช่าห้อง</h2>
    <h3 style="text-align:center;">ห้อง ${d.house}</h3>
    <h3 style="text-align:center;">
      ${new Date().toLocaleDateString("th-TH", {month:"long",year:"numeric"})}
    </h3>

    <table>
      <tr>
        <th>รายการ</th>
        <th>เลขครั้งก่อน</th>
        <th>เลขครั้งนี้</th>
        <th>หน่วย</th>
        <th>ราคา</th>
      </tr>

      <tr>
        <td class="left">ค่าน้ำ</td>
        <td>${d.wStart ?? 0}</td>
        <td>${d.wEnd ?? 0}</td>
        <td>${d.unit ?? 0}</td>
        <td>${d.water ?? 0}</td>
      </tr>

      <tr>
        <td class="left">ค่าไฟ</td>
        <td>-</td>
        <td>-</td>
        <td>-</td>
        <td>${d.elec ?? 0}</td>
      </tr>

      <tr>
        <td class="left">ค่าอื่นๆ</td>
        <td colspan="3">-</td>
        <td>${d.other ?? 0}</td>
      </tr>

      <tr>
        <td class="left">ค่าเช่า</td>
        <td colspan="3">-</td>
        <td>${d.rent ?? 0}</td>
      </tr>

      <tr>
        <td class="left"><b>รวม</b></td>
        <td colspan="3"></td>
        <td><b>${d.total ?? 0}</b></td>
      </tr>
    </table>

    <br>
    <div>ชำระภายในวันที่ 5 ของเดือน</div>

    <br><br>
    <div style="text-align:center;">
      ลงชื่อ _______________________<br>
      เจ้าของบ้าน
    </div>
  </div>
  `;
});

document.getElementById("container").innerHTML = html;


// 📥 PNG ทีละห้อง
function downloadOne(i) {
  const d = data[i];

  html2canvas(document.querySelector(`#bill-${i}`)).then(canvas => {
    let link = document.createElement("a");
    link.download = `bill_${d.house.replace("/", "-")}.png`;
    link.href = canvas.toDataURL();
    link.click();
  });
}

// 📥 PNG ทั้งหมด
function downloadAll() {
  document.querySelectorAll(".bill").forEach((el, i) => {
    const d = data[i];

    html2canvas(el).then(canvas => {
      let link = document.createElement("a");
      link.download = `bill_${d.house.replace("/", "-")}.png`;
      link.href = canvas.toDataURL();
      link.click();
    });
  });
}

// 📄 PDF ทีละห้อง (A5 แนวนอน)
function savePDF(i) {
  const d = data[i];
  const el = document.getElementById(`bill-${i}`);

  html2pdf()
  .from(el)
  .set({
    margin: 0,
    filename: `bill_${d.house.replace("/", "-")}.pdf`,
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: "mm", format: "a5", orientation: "landscape" }
  })
  .save();
}

// 📄 PDF ทั้งหมด
function saveAllPDF() {
  let container = document.createElement("div");

  document.querySelectorAll(".bill").forEach(el => {
    let clone = el.cloneNode(true);
    clone.style.pageBreakAfter = "always";
    container.appendChild(clone);
  });

  html2pdf()
  .from(el)
  .set({
    margin: 0,
    filename: `bill_${d.house.replace("/", "-")}.pdf`,
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: "mm", format: "a5", orientation: "landscape" }
  })
  .save();
}
</script>

</body>
</html>
