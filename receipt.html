<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ใบเสร็จ</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body { font-family: sans-serif; background:#eee; }

.bill {
  width: 800px;
  margin: 20px auto;
  background: #fff;
  border: 2px solid #000;
  padding: 20px;
}

table {
  width:100%;
  border-collapse: collapse;
}

td,th {
  border:1px solid #000;
  padding:6px;
  text-align:center;
}

.left { text-align:left; }

.btn {
  margin: 10px;
  padding: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<button class="btn" onclick="downloadAll()">📥 ดาวน์โหลดทั้งหมด</button>

<div id="container"></div>

<script>
const data = JSON.parse(localStorage.getItem("billData")) || [];
let html = "";

data.forEach((d, index) => {
  html += `
  <div class="bill" id="bill-${index}">
    <h2 style="text-align:center;">บิลค่าเช่าห้อง</h2>
    <h3 style="text-align:center;">ห้อง ${d.house}</h3>
    <h3 style="text-align:center;">${new Date().toLocaleDateString("th-TH", {month:"long",year:"numeric"})}</h3>

    <table>
      <tr>
        <th>รายการ</th>
        <th>เลขครั้งก่อน</th>
        <th>เลขครั้งนี้</th>
        <th>หน่วย</th>
        <th>ราคา</th>
      </tr>

      <tr>
        <td class="left">ค่าน้ำ</td>
        <td>${d.wStart}</td>
        <td>${d.wEnd}</td>
        <td>${d.unit}</td>
        <td>${d.water}</td>
      </tr>

      <tr>
        <td class="left">ค่าไฟ</td>
        <td>-</td>
        <td>-</td>
        <td>-</td>
        <td>${d.elec}</td>
      </tr>

      <tr>
        <td class="left">ค่าอื่นๆ</td>
        <td colspan="3">-</td>
        <td>${d.other}</td>
      </tr>

      <tr>
        <td class="left">ค่าเช่า</td>
        <td colspan="3">-</td>
        <td>${d.rent}</td>
      </tr>

      <tr>
        <td class="left"><b>รวม</b></td>
        <td colspan="3"></td>
        <td><b>${d.total}</b></td>
      </tr>
    </table>

    <br>
    <button onclick="downloadOne(${index})">📥 ดาวน์โหลดห้องนี้</button>

    <br><br>
    <div>ชำระภายในวันที่ 5 ของเดือน</div>

    <br><br>
    <div style="text-align:center;">
      ลงชื่อ _______________________<br>
      เจ้าของบ้าน
    </div>
  </div>
  `;
});

document.getElementById("container").innerHTML = html;


// 🔥 โหลดทีละห้อง
function downloadOne(i) {
  const d = data[i];
  html2canvas(document.querySelector(`#bill-${i}`)).then(canvas => {
    let link = document.createElement("a");
    link.download = `bill_${d.house.replace("/", "-")}.png`; // 🔥 ตรงนี้
    link.href = canvas.toDataURL();
    link.click();
  });
}

// 🔥 โหลดทั้งหมด
function downloadAll() {
  document.querySelectorAll(".bill").forEach((el, i) => {
    const d = data[i];
    html2canvas(el).then(canvas => {
      let link = document.createElement("a");
      link.download = `bill_${d.house.replace("/", "-")}.png`; // 🔥 ตรงนี้
      link.href = canvas.toDataURL();
      link.click();
    });
  });
}
  
</script>

</body>
</html>
