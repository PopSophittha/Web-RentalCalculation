<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Receipt</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  font-family: sans-serif;
  background: #eee;
  margin: 0;
}

.toolbar {
  text-align: center;
  margin: 20px;
}

.btn {
  padding: 10px 15px;
  margin: 5px;
  cursor: pointer;
}

.bill {
  width: 200mm;           /* ❗ ลดจาก 210 */
  height: 135mm;          /* ❗ fix ให้พอดี A5 */
  margin: 0 auto 10mm auto;
  background: #fff;
  border: 1px solid #000;
  padding: 8mm;
  box-sizing: border-box;

  display: flex;
  flex-direction: column;
  justify-content: space-between;

  page-break-after: always;
}

.actions {
  text-align: center;
  margin-bottom: 10px;
}

table {
  width:100%;
  border-collapse: collapse;
  table-layout: fixed;
}

td, th {
  border:1px solid #000;
  padding:6px;
  text-align:center;
  font-size: 13px;
}

.left {
  text-align:left;
}
</style>
</head>

<body>

<div class="toolbar">
  <button class="btn" onclick="downloadAll()">📥 PNG ทั้งหมด</button>
  <button class="btn" onclick="saveAllPDF()">📄 PDF ทั้งหมด</button>
</div>

<div id="container"></div>

<script>
const data = JSON.parse(localStorage.getItem("billData")) || [];

function formatNumber(n){
  return Number(n || 0).toLocaleString();
}

let html = "";

data.forEach((d, index) => {

  html += `
  
  <div class="actions">
    <button class="btn" onclick="downloadOne(${index})">
      📥 PNG ห้อง ${d.house}
    </button>
    <button class="btn" onclick="savePDF(${index})">
      📄 PDF ห้อง ${d.house}
    </button>
  </div>

  <div class="bill" id="bill-${index}">
    <h2 style="text-align:center;">Monthly Rental</h2>
    <h3 style="text-align:center;">House No. ${d.house}</h3>
    <h3 style="text-align:center;">
      ${new Date().toLocaleDateString("en-US", {month:"long",year:"numeric"})}
    </h3>

    <table>
      <tr>
        <th>Detail</th>
        <th>Previous</th>
        <th>Current</th>
        <th>Unit</th>
        <th>Price</th>
      </tr>

      <tr>
        <td class="left">Water</td>
        <td>${d.wStart ?? 0}</td>
        <td>${d.wEnd ?? 0}</td>
        <td>${d.unit ?? 0}</td>
        <td>${formatNumber(d.water)}</td>
      </tr>

      <tr>
        <td class="left">Electricity</td>
        <td>-</td>
        <td>-</td>
        <td>-</td>
        <td>${formatNumber(d.elec)}</td>
      </tr>

      <tr>
        <td class="left">Other</td>
        <td colspan="3">-</td>
        <td>${formatNumber(d.other)}</td>
      </tr>

      <tr>
        <td class="left">Rental</td>
        <td colspan="3">-</td>
        <td>${formatNumber(d.rent)}</td>
      </tr>

      <tr>
        <td class="left"><b>Total</b></td>
        <td colspan="3"></td>
        <td><b>${formatNumber(d.total)}</b></td>
      </tr>
    </table>

    <br>

    <div><b>Note:</b> ${d.note || "-"}</div>

    <br>
    <div>Paying on the 5th of every month</div>

    <br><br>
    <div style="text-align:center;">
      Sign _______________________<br>
      Owner
    </div>
  </div>
  `;
});

document.getElementById("container").innerHTML = html;


// PNG ทีละห้อง
function downloadOne(i) {
  const d = data[i];

  html2canvas(document.querySelector(`#bill-${i}`)).then(canvas => {
    let link = document.createElement("a");
    link.download = `bill_${d.house.replace("/", "-")}.png`;
    link.href = canvas.toDataURL();
    link.click();
  });
}

// PNG ทั้งหมด
function downloadAll() {
  document.querySelectorAll(".bill").forEach((el, i) => {
    const d = data[i];

    html2canvas(el).then(canvas => {
      let link = document.createElement("a");
      link.download = `bill_${d.house.replace("/", "-")}.png`;
      link.href = canvas.toDataURL();
      link.click();
    });
  });
}

// PDF ทีละห้อง
function savePDF(i) {
  const d = data[i];
  const el = document.getElementById(`bill-${i}`);

  html2pdf()
    .from(el)
    .set({
      margin: [5,5,5,5], // ❗ กันขอบ
      filename: `bill_${d.house.replace("/", "-")}.pdf`,
      html2canvas: { scale: 1.5 }, // ❗ ลด scale
      jsPDF: { unit: "mm", format: "a5", orientation: "landscape" }
    })
    .save();
}

// PDF ทั้งหมด
function saveAllPDF() {
  const wrapper = document.createElement("div");

  document.querySelectorAll(".bill").forEach(el => {
    const clone = el.cloneNode(true);

    clone.style.margin = "0 auto";
    clone.style.pageBreakAfter = "always";

    wrapper.appendChild(clone);
  });

  document.body.appendChild(wrapper);

  html2pdf()
    .from(wrapper)
    .set({
      margin: [5,5,5,5],
      filename: "all_bills.pdf",
      html2canvas: { scale: 1.5 },
      jsPDF: { unit: "mm", format: "a5", orientation: "landscape" }
    })
    .save()
    .then(() => document.body.removeChild(wrapper));
}
</script>

</body>
</html>
